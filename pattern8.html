<!DOCTYPE html>
<html>
<head>
<title>Diamond Star Pattern</title>
</head>
<body>

<h2>Diamond Star Pattern</h2>
<pre id="pattern"></pre>

<script>
let n = 5;
let pattern = "";

// Upper part
for (let i = 1; i <= n; i++) {
    for (let j = i; j < n; j++) {
        pattern += " ";
    }
    for (let k = 1; k <= i; k++) {
        pattern += "*";
    }
    pattern += "\n";
}

// Lower part
for (let i = n - 1; i >= 1; i--) {
    for (let j = n; j > i; j--) {
        pattern += " ";
    }
    for (let k = 1; k <= i; k++) {
        pattern += "*";
    }
    pattern += "\n";
}

document.getElementById("pattern").textContent = pattern;
</script>

</body>
</html>
