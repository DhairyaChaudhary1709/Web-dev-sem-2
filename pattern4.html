<!DOCTYPE html>
<html>
<head>
<title>Pattern 4</title>
</head>

<body>

<h2>Star Hourglass Pattern</h2>

<pre>
<script>

let n = 5;

// upper part
for(let i=n;i>=1;i--){
    
    for(let s=0;s<n-i;s++){
        document.write(" ");
    }

    for(let j=1;j<=2*i-1;j++){
        document.write("*");
    }

    document.write("<br>");
}

// lower part
for(let i=2;i<=n;i++){
    
    for(let s=0;s<n-i;s++){
        document.write(" ");
    }

    for(let j=1;j<=2*i-1;j++){
        document.write("*");
    }

    document.write("<br>");
}

</script>
</pre>

</body>
</html>
